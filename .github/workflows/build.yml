name: Build Magisk Module

on:
  push:
    branches: [ main ]
    paths-ignore: [ '**.md' ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ '**.md' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build module
        run: |
          zip -r9 Spoof_bl_prop-v1.0.0.zip \
            module.prop \
            customize.sh \
            post-fs-data.sh \
            service.sh \
            META-INF/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spoof_bl_prop-module
          path: Spoof_bl_prop-v1.0.0.zip
          retention-days: 30

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: Spoof_bl_prop-module
          path: .

      - name: Read version
        id: ver
        run: |
          ver=$(grep '^version=' module.prop | cut -d= -f2)
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: Spoof_bl_prop-v1.0.0.zip
          tag_name: ${{ steps.ver.outputs.version }}
          name: Spoof_bl_prop ${{ steps.ver.outputs.version }}
          body: |
            ## Spoof_bl_prop ${{ steps.ver.outputs.version }}
            
            Spoof your device bootloader and system properties to bypass detection apps.
            
            ### What it spoofs
            - Partition dm-verity (`partition.*.verified` 2→1)
            - OEM unlock (`ro.oem_unlock_supported` 1→0, `sys.oem_unlock_allowed` 1→0)
            - SELinux state (`ro.boot.selinux`, `ro.build.selinux` → enforcing)
            - USB config (strips `adb` token, keeps other modes like `mtp`)
            
            ### Install
            1. Download zip
            2. Install via APatch/Magisk/KernelSU
            3. Reboot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
